repos:
  # -----------------------------
  # Basic hygiene & safety checks
  # -----------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Prevent commiting large files (like .docx, .zip by mistake)
      - id: check-added-large-files
        args: ["--maxkb=500"]

      # Check python syntax validation
      - id: check-ast

      # Prevent commiting unresolved merge confliccts
      - id: check-merge-conflict

      # Ensure files end with a newline
      - id: end-of-file-fixer

      # Remove trailing whitespace
      - id: trailing-whitespace

      # Prevent commiting .env files
      - id: forbid-new-submodules
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      # Static type checker
      - id: mypy

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      # Automatic code formatter to a consistent style
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      # Linter, enforces code quality rules
      - id: ruff
        args: [--fix]
